<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    .bg-light { display: block; }
    .bg-dark { display: none; }
    @media (prefers-color-scheme: dark) {
      .bg-light { display: none; }
      .bg-dark { display: block; }
    }
  </style>
  <!-- Light mode: maroon icon on white background -->
  <rect class="bg-light" width="180" height="180" rx="37" fill="white"/>
  <!-- Dark mode: white icon on dark background -->
  <rect class="bg-dark" width="180" height="180" rx="37" fill="#1a1a1a"/>
  <!-- Icon mark (light mode) -->
  <image class="bg-light" x="15" y="15" width="150" height="150"
    href="data:image/png;base64,"
    preserveAspectRatio="xMidYMid meet"/>
  <!-- Icon mark (dark mode) - will need a white version but SVG filter can handle it -->
  <image class="bg-dark" x="15" y="15" width="150" height="150"
    href="data:image/png;base64,"
    style="filter: invert(1) sepia(0) saturate(1) brightness(2);"
    preserveAspectRatio="xMidYMid meet"/>
</svg>